version: 2

project_name: wayfinder-maps

# Three build flavours, one binary name. macOS binds WKWebView through cgo;
# Windows gets its native window via pure-Go WebView2 bindings; Linux stays
# pure Go here and carries its webkit linkage in the helper binary, which CI
# builds on Linux runners and drops into helpers/ before this config runs.
builds:
  - id: darwin
    main: ./cmd/wayfinder-maps
    binary: wayfinder-maps
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
  - id: windows
    main: ./cmd/wayfinder-maps
    binary: wayfinder-maps
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - arm64
      - amd64
  - id: linux
    main: ./cmd/wayfinder-maps
    binary: wayfinder-maps
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
      - amd64

archives:
  - id: standard
    ids: [darwin, windows]
    name_template: "wayfinder-maps_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
  # Linux archives ship the webkit helper next to the main binary; `app` and
  # the folder picker exec it from there.
  - id: linux
    ids: [linux]
    name_template: "wayfinder-maps_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - src: "helpers/linux_{{ .Arch }}/wayfinder-maps-webview"
        strip_parent: true

checksum:
  name_template: checksums.txt

changelog:
  use: github
