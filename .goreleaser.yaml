version: 2

project_name: wayfinder-maps

# Three build flavours, one binary name. macOS binds WKWebView through cgo;
# Windows gets its native window via pure-Go WebView2 bindings; Linux stays
# pure Go here and carries its webkit linkage in the helper binary, which CI
# builds on Linux runners and drops into helpers/ before this config runs.
builds:
  - id: darwin
    main: ./cmd/wayfinder-maps
    binary: wayfinder-maps
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
  - id: windows
    main: ./cmd/wayfinder-maps
    binary: wayfinder-maps
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - arm64
      - amd64
  - id: linux
    main: ./cmd/wayfinder-maps
    binary: wayfinder-maps
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
      - amd64

archives:
  # darwin and linux ship double-clickable launchers for the app window and
  # the browser view; macOS gets them as .command so Finder executes them.
  # Windows needs neither a shell script nor a helper, so its archive is bare.
  - id: darwin
    ids: [darwin]
    name_template: "wayfinder-maps_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - src: scripts/wayfinder-app
        dst: wayfinder-app.command
        info:
          mode: 0755
      - src: scripts/wayfinder-web
        dst: wayfinder-web.command
        info:
          mode: 0755
  - id: windows
    ids: [windows]
    name_template: "wayfinder-maps_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [zip]
  # Linux archives ship the webkit helper next to the main binary; `app` and
  # the folder picker exec it from there.
  - id: linux
    ids: [linux]
    name_template: "wayfinder-maps_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - src: "helpers/linux_{{ .Arch }}/wayfinder-maps-webview"
        strip_parent: true
      - src: scripts/wayfinder-app
        dst: wayfinder-app
        info:
          mode: 0755
      - src: scripts/wayfinder-web
        dst: wayfinder-web
        info:
          mode: 0755

checksum:
  name_template: checksums.txt

changelog:
  use: github
